<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Shipment Review</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #f4f6f9, #eef2ff);
            font-family: Arial, Helvetica, sans-serif;
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            max-width: 460px;
            width: 92%;
            padding: 32px 28px;
            border-radius: 14px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
        }

        p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 22px;
        }

        .shipment-id {
            text-align: center;
            background: #f9fafb;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* Rating stars */
        .rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 6px;
        }

        .rating input {
            display: none;
        }

        .rating label {
            font-size: 28px;
            color: #d1d5db;
            cursor: pointer;
        }

        .rating input:checked~label,
        .rating label:hover,
        .rating label:hover~label {
            color: #f59e0b;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Rate Your Shipment</h1>
        <p class="subtitle">We’d love your feedback on this delivery</p>

        <!-- ✅ CORRECT FORM -->
        <form action="{{ review_url }}" method="POST">

            <!-- Rating -->
            <div class="field">
                <label>Rating</label>
                <div class="rating">
                    <input type="radio" name="rating" id="star5" value="5" required>
                    <label for="star5">★</label>

                    <input type="radio" name="rating" id="star4" value="4">
                    <label for="star4">★</label>

                    <input type="radio" name="rating" id="star3" value="3">
                    <label for="star3">★</label>

                    <input type="radio" name="rating" id="star2" value="2">
                    <label for="star2">★</label>

                    <input type="radio" name="rating" id="star1" value="1">
                    <label for="star1">★</label>
                </div>
            </div>

            <!-- Feedback -->
            <div class="field">
                <label for="feedback">Feedback</label>
                <textarea id="feedback" name="comment" required
                    placeholder="Tell us about your experience..."></textarea>
            </div>

            <!-- Hidden references -->
            <input type="hidden" name="token" value="{{ token }}">

            <button type="submit">Submit Review</button>
        </form>

        <div class="footer">
            © FastShip • Thank you for your feedback
        </div>

    </div>

</body>

</html>
