<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Order Delivered</title>
</head>

<body style="font-family: Arial, sans-serif; color:#333;">
  <h2>Order Delivered ✅</h2>
  <p>Hi <strong>{{customer}}</strong>,</p>

  <p>Your order <strong>#{{shipment.id}}</strong> has been successfully delivered <strong>today</strong>.</p>

  <p>We hope you enjoy your purchase!</p>

  <p>
    ⭐ We’d love your feedback to improve our service.
  </p>

  <!-- CTA Button -->
  <div style="text-align:center; margin:28px 0;">
    <a href="{{ review_url }}" style="
                     display:inline-block;
                     background:linear-gradient(135deg,#2563eb,#3b82f6);
                     color:#ffffff;
                     text-decoration:none;
                     padding:12px 28px;
                     border-radius:999px;
                     font-size:14px;
                     font-weight:bold;
                   ">
      Submit feedback
    </a>
  </div>

  <p>Thanks for choosing <strong>FastShip</strong>!</p>
</body>

</html>
