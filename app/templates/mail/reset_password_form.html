<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f4f6f9, #eef2ff);
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      max-width: 420px;
      width: 90%;
      padding: 32px 28px;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    p {
      margin: 0 0 22px;
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="password"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.35);
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Reset Your Password</h1>
    <p>
      Please choose a new password for your account.
    </p>

    <form method="POST" action="{{ reset_password_action_url }}">
      <!-- Hidden token (from reset link) -->
      <input type="hidden" name="token" value="{{ reset_token }}"/>

      <div class="field">
        <label for="password">New Password</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          minlength="8"
          autocomplete="new-password"
        />
      </div>


      <button type="submit">Update Password</button>
    </form>

    <div class="footer">
      © FastShip
    </div>
  </div>

</body>
</html>
