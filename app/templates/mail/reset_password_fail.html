<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password Reset Failed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      background: linear-gradient(180deg, #fff1f2, #fdf2f8);
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      color: #7f1d1d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      max-width: 420px;
      width: 90%;
      padding: 36px 28px;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: #fee2e2;
      color: #991b1b;
      font-size: 34px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
      color: #991b1b;
    }

    p {
      margin: 0 0 24px;
      font-size: 14px;
      color: #7f1d1d;
      line-height: 1.6;
    }

    a.btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #dc2626, #ef4444);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    a.btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(239, 68, 68, 0.35);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon">!</div>

    <h1>Password Reset Failed</h1>

    <p>
      This password reset link is invalid or has expired.
      Please request a new password reset link and try again.
    </p>

    <div class="footer">
      © FastShip
    </div>
  </div>

</body>
</html>
