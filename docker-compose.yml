services:
  api:
    build: .
    ports:
      - "8000:8000"
    command: [ "fastapi", "run", "--port", "8000" ]
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    env_file:
      - dev.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=fastship
    ports:
      - "5433:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/18/docker/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery:
    build: .
    command: ["celery", "-A", "app.worker.task", "worker", "--loglevel=info"]
    environment:
      - REDIS_HOST=redis
    env_file:
      - dev.env
    depends_on:
      redis:
        condition: service_healthy